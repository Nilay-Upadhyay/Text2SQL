services:

  postgres:
    image: pgvector/pgvector:pg17
    container_name: text2sql-postgres

    ports:
      - "5432:5432"

    env_file:
      - ./.env

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: text2sql-pgadmin

    ports:
      - "5050:80"

    env_file:
      - ./.env
    
    depends_on:
      - postgres

volumes:
  postgres_data: